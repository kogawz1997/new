<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Redirecting to Legacy Admin</title>
  <meta http-equiv="refresh" content="0;url=/admin">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0f1713;
      color: #eaf4df;
      font-family: "Segoe UI", Tahoma, sans-serif;
    }
    .box {
      border: 1px solid rgba(180, 208, 140, 0.35);
      border-radius: 12px;
      padding: 18px 20px;
      background: rgba(255, 255, 255, 0.05);
      max-width: 560px;
      text-align: center;
    }
    a { color: #d7c47b; }
  </style>
</head>
<body>
  <main class="box">
    <h1>ย้ายไปหน้าแอดมินเดิม</h1>
    <p>Standalone นี้เป็นเว็บผู้เล่นเท่านั้น กำลังพาไปที่ <code>/admin</code>...</p>
    <p><a href="/admin">ไปตอนนี้</a></p>
  </main>
  <script>
    window.location.replace('/admin');
  </script>
</body>
</html>
