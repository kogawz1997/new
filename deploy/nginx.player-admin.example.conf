# Nginx reverse proxy for SCUM platform on split subdomains

server {
  listen 443 ssl http2;
  server_name admin.genz.noah-dns.online;

  # ssl_certificate /etc/letsencrypt/live/admin.genz.noah-dns.online/fullchain.pem;
  # ssl_certificate_key /etc/letsencrypt/live/admin.genz.noah-dns.online/privkey.pem;

  location = /healthz {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_pass http://127.0.0.1:3200/healthz;
  }

  location = /admin {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_pass http://127.0.0.1:3200/admin;
  }

  location ^~ /admin/ {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_pass http://127.0.0.1:3200;
  }

  location = /admin/auth/discord/start {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_pass http://127.0.0.1:3200/admin/auth/discord/start;
  }

  location = /admin/auth/discord/callback {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_pass http://127.0.0.1:3200/admin/auth/discord/callback;
  }
}

server {
  listen 443 ssl http2;
  server_name player.genz.noah-dns.online;

  # ssl_certificate /etc/letsencrypt/live/player.genz.noah-dns.online/fullchain.pem;
  # ssl_certificate_key /etc/letsencrypt/live/player.genz.noah-dns.online/privkey.pem;

  location = /healthz {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_pass http://127.0.0.1:3300/healthz;
  }

  location = /auth/discord/start {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_pass http://127.0.0.1:3300/auth/discord/start;
  }

  location = /auth/discord/callback {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_pass http://127.0.0.1:3300/auth/discord/callback;
  }

  location / {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_pass http://127.0.0.1:3300;
  }
}
